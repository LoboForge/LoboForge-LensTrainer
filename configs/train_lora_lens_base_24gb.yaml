job:
  name: lens-lora-base-24gb
  output_dir: ./output/lens-lora-base-24gb

model:
  repo_id: microsoft/Lens-Base
  dtype: bfloat16
  disable_mxfp4: false         # true only on 16GB / no MXFP4: CPU text cache (~15min/image)
  cpu_offload: true
  cache_text_embeddings: true  # disk cache; skipped on re-run — see README "Caching"

dataset:
  folder_path: ./dataset
  caption_ext: txt
  resolution: 0                # 0 = auto native aspect per image (snapped to 16px); 1024 = force square
  cache_latents: true          # disk cache; skipped on re-run — see README "Caching"
  max_sequence_length: 512

lora:
  rank: 16
  alpha: 16
  dropout: 0.0
  target_modules:
    - img_qkv
    - txt_qkv
    - to_out.0
    - to_add_out
    - img_mlp.w1
    - img_mlp.w2
    - img_mlp.w3
    - txt_mlp.w1
    - txt_mlp.w2
    - txt_mlp.w3
    - txt_in
    - img_in
    - proj_out

train:
  steps: 2000
  batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-4
  optimizer: adamw8bit
  weight_decay: 0.01
  gradient_checkpointing: true
  guidance_scale: 5.0
  timestep_type: shift
  save_every: 250
  sample_every: 100          # after sample_early_until
  sample_every_early: 50     # first-run cadence: steps 50,100,...,500
  sample_early_until: 500
  seed: 42
  max_grad_norm: 1.0

sample:
  trigger_word: mytrigger
  width: 0                     # 0 = match dataset dominant size (e.g. 512×768)
  height: 0
  steps: 50
  cfg: 5.0
  seed: 42
  walk_seed: true
  baseline_control: true     # step_000000_control_* — full prompt list on base model before training

  # [trigger] is replaced with sample.trigger_word
  prompts:
    - name: stage_full
      prompt: "a photo of [trigger] ballet dancer on stage, full body, soft spotlight, photorealistic"
    - name: studio_portrait
      prompt: "portrait of [trigger], ballet studio, hair in bun, shallow depth of field"
    - name: arabesque
      prompt: "[trigger] in arabesque on pointe, clean studio background, studio lighting"
    - name: cafe_candid
      prompt: "candid photo of [trigger] in street clothes, natural lighting"
    - name: sign_test
      prompt: "[trigger] holding a sign that says 'lens lora test', studio photo"
