job:
  name: lens-lora-base-24gb
  output_dir: ./output/lens-lora-base-24gb

model:
  repo_id: microsoft/Lens-Base
  dtype: bfloat16
  disable_mxfp4: true
  cpu_offload: true
  cache_text_embeddings: true

dataset:
  folder_path: ./dataset
  caption_ext: txt
  resolution: 1024
  cache_latents: true
  max_sequence_length: 512

lora:
  rank: 16
  alpha: 16
  dropout: 0.0
  target_modules:
    - img_qkv
    - txt_qkv
    - to_out
    - to_add_out
    - img_mlp
    - txt_mlp
    - txt_in
    - img_in
    - proj_out

train:
  steps: 2000
  batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-4
  optimizer: adamw8bit
  weight_decay: 0.01
  gradient_checkpointing: true
  guidance_scale: 5.0
  timestep_type: shift
  save_every: 250
  sample_every: 250
  seed: 42
  max_grad_norm: 1.0

sample:
  prompts:
    - "a photo of [trigger] person in a cafe, natural lighting"
    - "portrait of [trigger], shallow depth of field"
  trigger_word: mytrigger
  width: 1024
  height: 1024
  steps: 50
  cfg: 5.0
  seed: 42
