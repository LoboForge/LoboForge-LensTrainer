# Sebastian + Jessica dual-character LoRA — 24× 1024² PNGs with sidecar captions
# Dataset: /home/wrath/Documents/LoboForge/DualCharacterLoraV2
# Train with explicit CLI flags (see README); YAML defaults only.
job:
  name: lens-lora-sebastian-jessica-v2
  output_dir: ./output/lens-lora-sebastian-jessica-v2

model:
  repo_id: microsoft/Lens-Base
  dtype: bfloat16
  disable_mxfp4: true          # 16GB GPU default. false only on 20GB+ (MXFP4 GPU text cache)
  cpu_offload: true
  cache_text_embeddings: true

dataset:
  folder_path: /home/wrath/Documents/LoboForge/DualCharacterLoraV2
  caption_ext: txt
  resolution: 0                # auto: native size per image (1024×1024)
  max_training_edge: 0         # optional cap for huge sources, e.g. 1536 on 16GB
  cache_latents: true
  max_sequence_length: 512

lora:
  rank: 16
  alpha: 16
  dropout: 0.0
  target_modules:
    - img_qkv
    - txt_qkv
    - to_out.0
    - to_add_out
    - img_mlp.w1
    - img_mlp.w2
    - img_mlp.w3
    - txt_mlp.w1
    - txt_mlp.w2
    - txt_mlp.w3
    - txt_in
    - img_in
    - proj_out

train:
  steps: 4000
  batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-4
  optimizer: adamw8bit
  weight_decay: 0.01
  gradient_checkpointing: true
  guidance_scale: 5.0
  timestep_type: shift
  save_every: 250
  sample_every: 400
  sample_every_early: 0
  sample_early_until: 500
  seed: 42
  max_grad_norm: 1.0

sample:
  trigger_word: ""             # captions are full sentences; prompts below match .txt files
  width: 0                     # 0 = use dataset dominant size (1024×1024)
  height: 0
  steps: 50
  cfg: 5.0
  seed: 42
  walk_seed: true
  baseline_control: true

  # Verbatim from DualCharacterLoraV2 captions (three lines joined with spaces)
  prompts:
    - name: standing_forward_laughing
      prompt: "Sebastian is a blonde man with long hair and irish blue eyes in a tuxedo. Jessica is a redhead woman with long copper colored red hair and irish green eyes in a purple dress named. They are standing together facing forward and laughing"
    - name: campfire_marshmallows
      prompt: "Sebastian is a blonde man with long hair and irish blue eyes in a tuxedo. Jessica is a redhead woman with long copper colored red hair and irish green eyes in a purple dress named. They are sitting next to camp fire together roasting marshmallows at night, photo realistic, 8k high resolution"
    - name: beach_holding_hands
      prompt: "Sebastian is a blonde man with long hair and irish blue eyes in a tuxedo. Jessica is a redhead woman with long copper colored red hair and irish green eyes in a purple dress named. They are holding hands and walking along the beach, photo realistic, 8k high resolution"
    - name: side_view_facing
      prompt: "Sebastian is a blonde man with long hair and irish blue eyes in a tuxedo. Jessica is a redhead woman with long copper colored red hair and irish green eyes in a purple dress named. They are both standing sideways facing each other giving a side view of both, full body, transparent background"
    - name: medieval_tavern_bar
      prompt: "Sebastian is a blonde man with long hair and irish blue eyes in a tuxedo. Jessica is a redhead woman with long copper colored red hair and irish green eyes in a purple dress named. They are sitting at a bar in a medieval tavern, photo realistic, 8k high resolution"
    - name: nightclub_dancing
      prompt: "Sebastian is a blonde man with long hair and irish blue eyes in a tuxedo. Jessica is a redhead woman with long copper colored red hair and irish green eyes in a purple dress named. They are dancing in a nightclub surrounded by strobing lights, full body view"
